services:
  frontpage:
    image: hiquest/frontpage:latest
    ports:
      - "3043:3043"
    volumes:
      - ~/.frontpage:/data/frontpage
    environment:
      - NODE_ENV=production
      - FRONTPAGE_HOME=/data/frontpage
      - FRONTPAGE_MODEL=openrouter/google/gemini-2.5-flash
      # Set the API key for your chosen provider:
      - OPENROUTER_API_KEY=yourkey
      # - OPENAI_API_KEY=yourkey
      # - ANTHROPIC_API_KEY=yourkey
    restart: unless-stopped
