services:
  frontpage:
    image: hiquest/frontpage:latest
    ports:
      - "3043:3043"
    volumes:
      - ~/.frontpage:/data/frontpage
    environment:
      - NODE_ENV=production
      - FRONTPAGE_HOME=/data/frontpage
      - FRONTPAGE_MODEL=openai/gpt-5.4-nano
      # - FRONTPAGE_MODEL=openrouter/google/gemini-3-flash-preview
      # - FRONTPAGE_MODEL=anthropic/claude-haiku-4.5
      # Set the API key for your chosen provider:
      - OPENAI_API_KEY=yourkey
      # - OPENROUTER_API_KEY=yourkey
      # - ANTHROPIC_API_KEY=yourkey
    restart: unless-stopped
