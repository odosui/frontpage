services:
  frontpage:
    image: hiquest/frontpage:latest
    ports:
      - "3043:3043"
    volumes:
      - ~/.frontpage:/data/frontpage
    environment:
      - NODE_ENV=production
      - FRONTPAGE_HOME=/data/frontpage
      - ANTHROPIC_API_KEY=yourkey
      - OPENROUTER_API_KEY=yourkey
      - FRONTPAGE_MODEL=google/gemini-3-flash-preview
    restart: unless-stopped
