version: "3.8"

services:
  mt:
    image: hiquest/mt:1.1.1
    ports:
      - "3042:3042"
    volumes:
      # Mount your local mt directory to the container
      # Change the path on the left side to your desired location
      - ./mt-data:/data/mt
    environment:
      - NODE_ENV=production
      - MT_PORT=3042
      - MT_HOME=/data/mt
      - ANTHROPIC_API_KEY=yourkey
    restart: unless-stopped
